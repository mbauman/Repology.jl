services:
  app:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-24.04
    volumes:
      # Mount the workspace parent so Codespaces can bind the repo at
      # /workspaces/Repology.jl without conflicting with the overlay
      # mount that docker-compose.codespaces.yml injects to the same path.
      - ../..:/workspaces:cached
    command: sleep infinity

  db:
    build:
      context: .
      dockerfile: Dockerfile.postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: repology
      POSTGRES_PASSWORD: repology
      POSTGRES_DB: repology
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # init.sql runs on first startup (when the data volume is empty).
      # Mounting it here means changes take effect after `docker compose down -v`.
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  postgres-data:
